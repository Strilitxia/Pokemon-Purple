<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pokemon 3D WebGL - Full RPG & Types</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'VT323', monospace; touch-action: none; user-select: none; }
        #game-canvas { width: 100vw; height: 100vh; display: block; }
        
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .d-pad { position: absolute; bottom: 30px; left: 30px; width: 120px; height: 120px; pointer-events: auto; }
        .btn { position: absolute; background: rgba(255, 255, 255, 0.5); border: 2px solid #333; border-radius: 5px; width: 40px; height: 40px; text-align: center; line-height: 40px; font-size: 20px; font-weight: bold; }
        .btn:active { background: rgba(200, 200, 200, 0.8); }
        #up { top: 0; left: 40px; } #down { bottom: 0; left: 40px; } #left { top: 40px; left: 0; } #right { top: 40px; right: 0; }
        #action-buttons { position: absolute; bottom: 30px; right: 30px; pointer-events: auto; }
        #btn-a { width: 60px; height: 60px; border-radius: 50%; background: rgba(255, 0, 0, 0.6); color: white; line-height: 60px; text-align: center; font-size: 24px; font-weight: bold; border: 3px solid darkred; }
        #btn-team { position: absolute; top: 10px; right: 10px; padding: 10px; background: #2b5b84; color: white; border: 3px solid white; border-radius: 8px; font-size: 18px; pointer-events: auto; font-family: 'VT323'; cursor: pointer; }
        #btn-team:active { background: #18385d; }
        #action-prompt { position: absolute; bottom: 110px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 5px 15px; border: 2px solid white; border-radius: 20px; font-size: 22px; display: none; pointer-events: none; }
        #hud { position: absolute; top: 10px; left: 10px; background: rgba(255,255,255,0.8); color: black; padding: 5px 10px; border: 2px solid black; border-radius: 5px; font-size: 18px; pointer-events: auto;}
        
        /* BATTLE UI */
        #battle-ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; pointer-events: none; }
        .hp-box { position: absolute; background: #ffffe6; border: 3px solid #555; border-radius: 8px; padding: 8px; width: 200px; box-shadow: 2px 2px 0px rgba(0,0,0,0.3); pointer-events: auto; }
        .hp-box .name-row { display: flex; justify-content: space-between; font-size: 22px; font-weight: bold; text-transform: uppercase; margin-bottom: 5px;}
        .hp-bar-container { background: #555; border: 2px solid #222; border-radius: 10px; width: 100%; height: 12px; position: relative; overflow: hidden; margin-bottom: 2px; }
        .hp-bar { height: 100%; background: #00ff00; width: 100%; transition: width 0.3s; }
        .exp-bar-container { background: #555; border: 1px solid #222; width: 100%; height: 4px; position: relative; overflow: hidden; }
        .exp-bar { height: 100%; background: #00ccff; width: 0%; transition: width 0.3s; }
        .hp-text { text-align: right; font-size: 18px; margin-top: 2px; font-weight: bold;}
        #enemy-hud { top: 20px; left: 20px; border-bottom-right-radius: 20px; }
        #player-hud { bottom: 120px; right: 20px; border-top-left-radius: 20px; }
        
        .battle-bottom { position: absolute; bottom: 0; left: 0; width: 100%; height: 100px; display: flex; pointer-events: auto; }
        .dialogue-box { flex: 1; background: #2b5b84; border: 6px solid #d0d0d8; border-radius: 10px; margin: 5px; color: white; font-size: 24px; padding: 15px; box-shadow: inset 0 0 0 2px #18385d; }
        .action-box { width: 200px; background: white; border: 6px solid #e06060; border-radius: 10px; margin: 5px; display: flex; flex-wrap: wrap; box-shadow: inset 0 0 0 2px #882020; overflow:hidden;}
        .action-btn { width: 50%; height: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; cursor: pointer; color: #333; text-transform: uppercase; text-align:center; }
        .action-btn:active { background: #eee; }
        .action-btn.disabled { color: #aaa; text-decoration: line-through; pointer-events: none; }
        #moves-box { display: none; width: 250px; background: white; border: 6px solid #60c060; border-radius: 10px; margin: 5px; flex-wrap: wrap; box-shadow: inset 0 0 0 2px #208820; pointer-events: auto; overflow-y:auto;}
        
        .dmg-text { position: absolute; transform: translate(-50%, -50%); pointer-events: none; animation: floatUp 1s ease-out forwards; z-index: 50; }
        @keyframes floatUp { 0% { opacity: 1; transform: translate(-50%, 0); } 100% { opacity: 0; transform: translate(-50%, -60px); } }
        .dmg-normal { color: white; font-size: 24px; text-shadow: 2px 2px 0 #000; }
        .dmg-special { color: #ffaa00; font-size: 32px; font-weight: bold; text-shadow: 2px 2px 0 #000, 0 0 10px #ff0000; }
        .dmg-ultimate { color: #ff0000; font-size: 48px; font-weight: bold; text-shadow: 3px 3px 0 #000, 0 0 20px #ffaa00; text-transform: uppercase; }

        .menu-screen { position: absolute; top: 10%; left: 10%; width: 80%; height: 80%; background: #2b5b84; border: 6px solid #d0d0d8; border-radius: 10px; color: white; padding: 20px; display: none; pointer-events: auto; overflow-y: auto; box-sizing: border-box; box-shadow: inset 0 0 0 2px #18385d, 0 10px 20px rgba(0,0,0,0.8); z-index: 100; }
        .close-btn { position: absolute; top: 10px; right: 10px; background: red; color: white; border: 2px solid white; padding: 5px 15px; cursor: pointer; font-family: 'VT323'; font-size: 20px;}
        .team-card { background: rgba(255,255,255,0.1); border: 2px solid #fff; margin-bottom: 10px; padding: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .team-info { flex: 1; }
        .team-skills { flex: 1; font-size: 16px; color: #ffcc00; }
        .team-actions button { background: #e06060; border: 2px solid #fff; color: white; padding: 5px 10px; font-family: 'VT323'; font-size: 18px; cursor: pointer; margin-left: 5px;}
        
        .menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border: 4px solid black; border-radius: 10px; display: none; pointer-events: auto; text-align: center; width: 80%; max-width: 300px; font-size: 20px; z-index: 90;}
        .menu button { margin: 5px; padding: 10px; font-size: 18px; width: 100%; font-family: 'VT323', monospace; cursor: pointer; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div id="game-canvas"></div>
    <div id="ui-layer">
        <div id="hud">Gold: <span id="gold-count">100</span> | Food: <span id="food-count">2</span></div>
        <button id="btn-team" onclick="TeamMenu.open()">TEAM / PKMN</button>
        <div id="action-prompt">▼ Press 'A' to Interact</div>
        <div class="d-pad" id="movement-controls">
            <div class="btn" id="up">W</div><div class="btn" id="left">A</div><div class="btn" id="right">D</div><div class="btn" id="down">S</div>
        </div>
        <div id="action-buttons"><div id="btn-a">A</div></div>
    </div>

    <div id="battle-ui">
        <div class="hp-box" id="enemy-hud">
            <div class="name-row"><span id="enemy-name">Enemy</span> <span style="font-size:18px;">Lv<span id="enemy-lvl">5</span></span></div>
            <div class="hp-bar-container"><div class="hp-bar" id="enemy-hp-bar"></div></div>
        </div>
        <div class="hp-box" id="player-hud">
            <div class="name-row"><span id="player-name">Pikachu</span> <span style="font-size:18px;">Lv<span id="player-lvl">5</span></span></div>
            <div class="hp-bar-container"><div class="hp-bar" id="player-hp-bar"></div></div>
            <div class="exp-bar-container"><div class="exp-bar" id="player-exp-bar"></div></div>
            <div class="hp-text"><span id="player-hp-text">20</span> / <span id="player-maxhp-text">20</span></div>
        </div>
        <div class="battle-bottom">
            <div class="dialogue-box" id="battle-dialogue">What will you do?</div>
            <div class="action-box" id="main-actions">
                <div class="action-btn" onclick="BattleSystem.showMoves()">FIGHT</div>
                <div class="action-btn" onclick="BattleSystem.showBag()">BAG</div>
                <div class="action-btn" onclick="BattleSystem.showTeam()">PKMN</div>
                <div class="action-btn" onclick="BattleSystem.runAway()">RUN</div>
            </div>
            <div class="action-box" id="moves-box" style="display:none; width:auto; min-width:250px;"></div>
        </div>
    </div>

    <div id="team-screen" class="menu-screen">
        <button class="close-btn" onclick="TeamMenu.close()">X</button>
        <h1 style="margin-top:0; color:#ffcc00; text-align:center;">MY POKEMON TEAM</h1>
        <div id="team-list"></div>
    </div>

    <div id="interaction-menu" class="menu">
        <h2 id="int-title">Menu</h2>
        <div id="int-buttons"></div>
        <button onclick="GameLogic.closeMenus()">Close</button>
    </div>

<script>
    // ==========================================
    // 1. TYPE CHART & DAMAGE LOGIC
    // ==========================================
    const TypeChart = {
        "Fire": { strong: ["Grass", "Bug", "Steel"], weak: ["Water", "Ground", "Rock"] },
        "Water": { strong: ["Fire", "Ground", "Rock"], weak: ["Electric", "Grass"] },
        "Grass": { strong: ["Water", "Ground", "Rock"], weak: ["Fire", "Bug", "Flying"] },
        "Electric": { strong: ["Water", "Flying"], weak: ["Ground"] },
        "Flying": { strong: ["Grass", "Bug"], weak: ["Electric", "Rock"] },
        "Normal": { strong: [], weak: [] },
        "Bug": { strong: ["Grass"], weak: ["Fire", "Flying", "Rock"] },
        "Psychic": { strong: [], weak: ["Bug"] }
    };

    function getTypeMult(atkType, defType) {
        let finalMult = 1;
        let atkStats = TypeChart[atkType];
        let defStats = TypeChart[defType];
        if (atkStats && atkStats.strong.includes(defType)) finalMult *= 2;
        if (defStats && defStats.weak.includes(atkType)) finalMult = 2;
        if (atkStats && atkStats.weak.includes(defType)) finalMult *= 0.5;
        if (defStats && defStats.strong.includes(atkType)) finalMult = 0.5;
        return finalMult;
    }

    // ==========================================
    // 2. GAME API & MOVESET DATA
    // ==========================================
    const GameAPI = {
    models: {}, customPokemons: [], worldSize: 100, textureLoader: new THREE.TextureLoader(),
    
    // NEW: Initialize the GLTF Loader
    gltfLoader: new THREE.GLTFLoader(),

    addPokemon: function(name, type, baseHp, baseAtk, moves) { 
        this.customPokemons.push({ name, type, baseHp, baseAtk, moves }); 
    },

    // NEW: Function to load 3D Models and hide the placeholder boxes
    replaceWithModel: function(placeholderMesh, modelUrl, scale = 1, offsetY = 0, onLoadCallback = null) {
        this.gltfLoader.load(modelUrl, (gltf) => {
            const model = gltf.scene;
            model.scale.set(scale, scale, scale);
            model.position.y = offsetY; // Adjust height if model floats
            
            // Make the new model cast and receive shadows
            model.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });

            placeholderMesh.add(model); // Attach model to the box
            placeholderMesh.material.visible = false; // Hide the colored box!

            if (onLoadCallback) onLoadCallback(gltf); // Trigger animation setup!
        }, undefined, (error) => {
            console.error("Error loading model:", modelUrl, error);
        });
    },

    // (Keep your existing applyTexture function here)
    applyTexture: function(mesh, textureUrl, repeatX = 1, repeatY = 1) {
        this.textureLoader.load(textureUrl, function(texture) {
            texture.wrapS = THREE.RepeatWrapping; texture.wrapT = THREE.RepeatWrapping;
            texture.repeat.set(repeatX, repeatY); mesh.material.map = texture; mesh.material.needsUpdate = true;
        });
    }
};

    const pikaMoves = [ { name: "Tackle", type: "normal", mult: 1, reqLvl: 1 }, { name: "Spark", type: "special", mult: 1.8, reqLvl: 4 }, { name: "Thunder", type: "ultimate", mult: 3.5, reqLvl: 10 } ];
    const basicMoves = [ { name: "Scratch", type: "normal", mult: 1, reqLvl: 1 }, { name: "Bite", type: "special", mult: 1.5, reqLvl: 3 }, { name: "Hyper Beam", type: "ultimate", mult: 3.0, reqLvl: 12 } ];
    const fireMoves = [ { name: "Tackle", type: "normal", mult: 1, reqLvl: 1 }, { name: "Ember", type: "special", mult: 1.5, reqLvl: 4 }, { name: "Fire Blast", type: "ultimate", mult: 3.2, reqLvl: 10 } ];
    const waterMoves = [ { name: "Tackle", type: "normal", mult: 1, reqLvl: 1 }, { name: "Water Gun", type: "special", mult: 1.5, reqLvl: 4 }, { name: "Hydro Pump", type: "ultimate", mult: 3.2, reqLvl: 10 } ];

    GameAPI.addPokemon("Pidgey", "Flying", 15, 4, basicMoves);
    GameAPI.addPokemon("Rattata", "Normal", 12, 5, basicMoves);
    GameAPI.addPokemon("Charmander", "Fire", 18, 5, fireMoves);
    GameAPI.addPokemon("Squirtle", "Water", 20, 4, waterMoves);
    GameAPI.addPokemon("Bulbasaur", "Grass", 20, 5, [ { name: "Tackle", type: "normal", mult: 1, reqLvl: 1 }, { name: "Vine Whip", type: "special", mult: 1.7, reqLvl: 5 }, { name: "Solar Beam", type: "ultimate", mult: 4.0, reqLvl: 15 } ]);

    function createPokemon(name, type, level, baseHp, baseAtk, moves) {
        let maxHp = baseHp + (level * 5); let attack = baseAtk + (level * 2);
        return { name, type, level, hp: maxHp, maxHp, attack, exp: 0, moves: JSON.parse(JSON.stringify(moves)) };
    }

    const PlayerState = { gold: 100, food: 5, activeIdx: 0, team: [ createPokemon("Pikachu", "Electric", 5, 18, 5, pikaMoves) ] };
    let currentRoom = "WORLD"; let gameState = "FREE_ROAM"; let currentEnemy = null;

    // ==========================================
    // 3. THREE.JS ENVIRONMENT SETUP
    // ==========================================
    const scene = new THREE.Scene(); scene.background = new THREE.Color(0x87CEEB);
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true }); renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true; renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.outputEncoding = THREE.sRGBEncoding; 
    document.getElementById('game-canvas').appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0x909090)); 
    // Slightly warm yellow sun
    const sun = new THREE.DirectionalLight(0xfffaee, 1.5); 
    sun.position.set(20, 40, 20);
    // Sky color (light blue), Ground color (dark green/brown), Intensity
    const hemiLight = new THREE.HemisphereLight(0xddeeff, 0x223311, 0.6);
    scene.add(hemiLight); 
    sun.castShadow = true;
    sun.shadow.mapSize.width = 2048; sun.shadow.mapSize.height = 2048; scene.add(sun);

    const createMesh = (geo, mat, castShad=true, recShad=true) => { let m = new THREE.Mesh(geo, mat); m.castShadow = castShad; m.receiveShadow = recShad; return m; };

    const worldGroup = new THREE.Group(); const hospitalGroup = new THREE.Group();
    const stadiumGroup = new THREE.Group(); const battleGroup = new THREE.Group();
    scene.add(worldGroup); scene.add(hospitalGroup); scene.add(stadiumGroup); scene.add(battleGroup);


    // --- NEW PLAYER ANIMATION SETUP ---
    let playerMixer; 
    let playerActions = {}; 
    let activeAction; 
    
    function fadeToAnimation(animName) {
        const newAction = playerActions[animName];
        if (!newAction || activeAction === newAction) return;
        const previousAction = activeAction;
        activeAction = newAction;
        if (previousAction) previousAction.fadeOut(0.2);
        activeAction.reset().setEffectiveTimeScale(1).setEffectiveWeight(1).fadeIn(0.2).play();
    }

    // --- NEW NURSE JOY ANIMATION SETUP ---
    let nurseMixer;
    let nurseGreetAction;
    let isNurseGreeting = false; // Tracks if the player is currently standing at the desk

    //--------------------------------------------------------------------------------------
    // --- NEW BOSS ANIMATION SETUP ---
    let bossMixer;
    let bossActions = {};
    let activeBossAction;
    let bossState = 'SLEEP'; // States: SLEEP, WAKING, GREET, BYE
    let wasInStadium = false;
    let wasNearBoss = false;

    function fadeBossAnimation(animName, duration = 0.3) {
        const newAction = bossActions[animName];
        if (!newAction || activeBossAction === newAction) return;
        const previousAction = activeBossAction;
        activeBossAction = newAction;
        if (previousAction) previousAction.fadeOut(duration);
        activeBossAction.reset().setEffectiveTimeScale(1).setEffectiveWeight(1).fadeIn(duration).play();
    }
    //---------------------------------------------------------------------------------------

    const playerMesh = createMesh(new THREE.BoxGeometry(1, 1, 1), new THREE.MeshLambertMaterial({ color: 0xffff00 })); playerMesh.position.y = 0.5; scene.add(playerMesh);
    
    // Load model and extract animations
    GameAPI.replaceWithModel(playerMesh, 'models/player.glb', 0.5, -0.5, (gltf) => {
        playerMixer = new THREE.AnimationMixer(gltf.scene);
        
        // IMPORTANT: Put your exact exact animation names here!
        const idleClip = THREE.AnimationClip.findByName(gltf.animations, "Idle") || gltf.animations[8];
        const walkClip = THREE.AnimationClip.findByName(gltf.animations, "Walk") || gltf.animations[0];

        if (idleClip) playerActions['Idle'] = playerMixer.clipAction(idleClip);
        if (walkClip) playerActions['Walk'] = playerMixer.clipAction(walkClip);

        // Start by playing Idle
        if (playerActions['Idle']) {
            activeAction = playerActions['Idle'];
            activeAction.play();
        }
    });

//---WORLD MAP SETUP ----------------------------------------------------------------
    const ground = createMesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshLambertMaterial({ color: 0x228B22 }), false, true); ground.rotation.x = -Math.PI / 2; worldGroup.add(ground);
    GameAPI.applyTexture(ground, 'textures/grass.jpg', 20, 20);
    // --- CUSTOM WORLD MAP DATA ---
    const customMapData = [
        { type: 'hospital', x: -10, z: -10 },
        { type: 'arena', x: 12, z: -14 },
        // Sample grass blocks
        { type: 'grass', x: -8, z: 6 }, { type: 'grass', x: -6, z: 6 }, { type: 'grass', x: -4, z: 6 },
        { type: 'grass', x: -8, z: 8 }, { type: 'grass', x: -6, z: 8 }, { type: 'grass', x: -4, z: 8 },
        // Sample path
        { type: 'path', x: 0, z: -4 }, { type: 'path', x: 0, z: -2 }, { type: 'path', x: 0, z: 0 },
        { type: 'fence', x: 0, z: -2, rotation: -1.57 }
    ];

    let grassZonesList = [];// Tracks grass locations for battles
     let fenceZonesList = []; 

    // 1. Define buildings globally so collision checks don't break
    const hospExt = createMesh(new THREE.BoxGeometry(4, 3, 4), new THREE.MeshLambertMaterial({ color: 0xcc0000 }));
    const hospDoor = createMesh(new THREE.PlaneGeometry(1.5, 2), new THREE.MeshBasicMaterial({ color: 0x000000 }), false, false);
    const stadExt = createMesh(new THREE.CylinderGeometry(5, 5, 4, 16), new THREE.MeshLambertMaterial({ color: 0x888888 }));
    const stadDoor = createMesh(new THREE.PlaneGeometry(2, 2.5), new THREE.MeshBasicMaterial({ color: 0x000000 }), false, false);

    hospDoor.material.visible = true; // Hide the door mesh, we just need it for collision detection
    stadDoor.material.visible = false;
    GameAPI.replaceWithModel(stadExt, 'models/stadium_ext.glb', 7, -2.1, (gltf) => {
        // NUDGE THE 3D MODEL HERE:
        // Adjust these numbers until the 3D model perfectly aligns with the invisible door!
        gltf.scene.position.x = 0; // Positive moves right, negative moves left
        gltf.scene.position.z = 0; // Positive moves forward, negative moves backward
        let degreesToRotate = 90; 
        gltf.scene.rotation.y = degreesToRotate * (Math.PI / 180);
    });

    GameAPI.replaceWithModel(hospExt, 'models/hospital_ext.glb', 1, -8.05, (gltf) => {
        // NUDGE THE 3D MODEL HERE:
        // Adjust these numbers until the 3D model perfectly aligns with your door!
        gltf.scene.position.x = -6.4; // Positive moves right, negative moves left
        gltf.scene.position.z = 5; // Positive moves forward, negative moves backward
    });

    // 2. Load Models & Build the World Dynamically
    GameAPI.gltfLoader.load('models/grass.glb', (grassGltf) => {
        customMapData.forEach(item => {
            if (item.type === 'hospital') {
                hospExt.position.set(item.x, 1.5, item.z);
                hospDoor.position.set(item.x, 1, item.z + 2.01); // Door sits just in front
                worldGroup.add(hospExt); worldGroup.add(hospDoor);
            } 
            else if (item.type === 'arena') {
                stadExt.position.set(item.x, 2, item.z);
                
                // --- REPOSITION THE STADIUM DOOR HERE ---
                // Add or subtract from item.x (Left/Right) and item.z (Forward/Back)
                // Example: item.x + 2 will move the door 2 units to the right
                // Example: item.z + 7 will move the door further out to the front
                let doorOffsetX = 0; 
                let doorOffsetZ = 10; 
                
                stadDoor.position.set(item.x + doorOffsetX, 1.25, item.z + doorOffsetZ);
                worldGroup.add(stadExt); worldGroup.add(stadDoor);
            }
            else if (item.type === 'grass') {
                let grassClone = grassGltf.scene.clone();
                grassClone.position.set(item.x, 0, item.z);
                grassClone.rotation.y = Math.random() * Math.PI;
                grassClone.scale.y = 0.8 + Math.random() * 0.4;
                worldGroup.add(grassClone);
                grassZonesList.push({ x: item.x, z: item.z }); // Save to list for battles
            }
            else if (item.type === 'path') {
                const pathMesh = createMesh(new THREE.PlaneGeometry(2, 2), new THREE.MeshLambertMaterial({ color: 0xd2b48c }), false, true);
                pathMesh.rotation.x = -Math.PI / 2;
                pathMesh.position.set(item.x, 0.05, item.z);
                GameAPI.applyTexture(pathMesh, 'textures/path.jpg', 1, 1);
                worldGroup.add(pathMesh);
            }
            
        });
    });

    // --- UPDATED FENCE LOADER ---
    GameAPI.gltfLoader.load('models/fence.glb', (fenceGltf) => {
        customMapData.forEach(item => {
            if (item.type === 'fence') {
                let fenceClone = fenceGltf.scene.clone();
                fenceClone.position.set(item.x, 0, item.z);
                
                let fenceRot = item.rotation || 0;
                fenceClone.rotation.y = fenceRot;
                
                fenceClone.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });

                worldGroup.add(fenceClone); 
                
                // --- NEW: Calculate exact physical boundaries ---
                // We force the game to apply the position and rotation first
                fenceClone.updateMatrixWorld(true); 
                // Then we wrap an invisible shrink-wrap box around the actual 3D mesh
                let bbox = new THREE.Box3().setFromObject(fenceClone);
                
                // Save this exact box to our collision list
                fenceZonesList.push(bbox); 
            }
        });
    });

// --- HOSPITAL ROOM SETUP ----------------------------------------------------------------
    // --- HOSPITAL ROOM SETUP ----------------------------------------------------------------
    hospitalGroup.visible = false;
    
    // --- NEW: Load Custom Interior Environment ---
    const hospInt = createMesh(new THREE.BoxGeometry(1, 1, 1), new THREE.MeshBasicMaterial({ color: 0x000000 }));
    hospInt.position.set(0, 0, 1); // Center of the room

    // ==========================================

    // ==========================================
    function showFloatingDamage(mesh, amount, type) {
        const div = document.createElement('div'); div.innerText = amount; div.className = `dmg-text dmg-${type}`;
        const pos = mesh.position.clone(); pos.project(camera);
        div.style.left = `${(pos.x * .5 + .5) * window.innerWidth}px`; div.style.top = `${(-(pos.y * .5) + .5) * window.innerHeight}px`;
        document.body.appendChild(div); setTimeout(() => div.remove(), 1000);
    }
    function animatePhysicalAttack(mesh, targetMesh, type, callback) {
        let origZ = mesh.position.z; let origY = mesh.position.y;
        if(type === 'normal') { mesh.position.z += (mesh === bPlayerMesh ? -1.5 : 1.5); setTimeout(() => { mesh.position.z = origZ; targetMesh.position.x += 0.5; setTimeout(()=>targetMesh.position.x-=0.5, 100); callback(); }, 200); } 
        else if(type === 'special') { let r=0; let int=setInterval(()=>{mesh.rotation.y+=0.5; r+=0.5; if(r>Math.PI*2){clearInterval(int); mesh.rotation.y=0; targetMesh.position.x-=0.5; setTimeout(()=>targetMesh.position.x+=0.5, 100); callback();}}, 20); } 
        else if(type === 'ultimate') { mesh.scale.set(2, 2, 2); mesh.position.y += 2; setTimeout(() => { mesh.scale.set(1, 1, 1); mesh.position.y = origY; document.body.style.transform = "translate(10px, 10px)"; setTimeout(()=>document.body.style.transform="none", 150); targetMesh.rotation.z = 0.5; setTimeout(()=>targetMesh.rotation.z=0, 200); callback(); }, 500); }
    }

    const BattleSystem = {
        getActive: function() { return PlayerState.team[PlayerState.activeIdx]; },
        startWildEncounter: function() {
            let myPkmn = this.getActive();
            let isTough = Math.random() < 0.3; let levelOffset = isTough ? Math.floor(Math.random()*3)+1 : Math.floor(Math.random()*3)-2;
            let eLevel = Math.max(1, myPkmn.level + levelOffset);
            let tpl = GameAPI.customPokemons[Math.floor(Math.random() * GameAPI.customPokemons.length)];
            currentEnemy = createPokemon(tpl.name, tpl.type, eLevel, tpl.baseHp, tpl.baseAtk, tpl.moves);
            currentEnemy.isBoss = false; this.initBattleScene();
        },
        startBossFight: function() {
            currentEnemy = createPokemon("Mewtwo", "Psychic", 50, 100, 25, basicMoves); currentEnemy.maxHp = 300; currentEnemy.hp = 300; currentEnemy.isBoss = true;
            this.initBattleScene();
        },
        initBattleScene: function() {
            gameState = "BATTLE_ANIMATING"; keys.w = keys.a = keys.s = keys.d = false;
            worldGroup.visible = hospitalGroup.visible = stadiumGroup.visible = false; battleGroup.visible = true; battleGroup.position.copy(playerMesh.position); 
            camera.position.set(battleGroup.position.x - 5, battleGroup.position.y + 3, battleGroup.position.z + 6); camera.lookAt(battleGroup.position.x + 2, battleGroup.position.y + 1, battleGroup.position.z - 3);
            document.getElementById('movement-controls').style.display='none'; document.getElementById('action-buttons').style.display='none'; document.getElementById('action-prompt').style.display='none'; document.getElementById('battle-ui').style.display='block';
            
            // Auto switch to first alive if active is dead
            if (this.getActive().hp <= 0) { PlayerState.activeIdx = PlayerState.team.findIndex(p => p.hp > 0); }
            
            this.hideMoves(); this.updateBars();
            this.typeText(`Wild ${currentEnemy.name.toUpperCase()} appeared!`, () => { this.typeText(`Go! ${this.getActive().name.toUpperCase()}!`, () => { gameState = "BATTLE"; }); });
        },
        updateBars: function() {
            let active = this.getActive(); const getC = (pct) => pct>50?'#00ff00':pct>20?'#ffcc00':'#ff0000';
            document.getElementById('player-name').innerText = active.name.toUpperCase(); document.getElementById('player-lvl').innerText = active.level;
            document.getElementById('enemy-name').innerText = currentEnemy.name.toUpperCase(); document.getElementById('enemy-lvl').innerText = currentEnemy.level;

            let pPct = Math.max(0, (active.hp/active.maxHp)*100); document.getElementById('player-hp-bar').style.width = pPct+'%'; document.getElementById('player-hp-bar').style.backgroundColor = getC(pPct);
            document.getElementById('player-hp-text').innerText = Math.max(0, active.hp); document.getElementById('player-maxhp-text').innerText = active.maxHp;
            let ePct = Math.max(0, (currentEnemy.hp/currentEnemy.maxHp)*100); document.getElementById('enemy-hp-bar').style.width = ePct+'%'; document.getElementById('enemy-hp-bar').style.backgroundColor = getC(ePct);
            let expPct = Math.min(100, (active.exp / (active.level*20)) * 100); document.getElementById('player-exp-bar').style.width = expPct+'%';
        },
        typeText: function(text, callback) {
            gameState = "BATTLE_ANIMATING"; const box = document.getElementById('battle-dialogue'); box.innerText = ""; let i = 0;
            const tWriter = setInterval(() => { box.innerText += text.charAt(i); i++; if (i>=text.length) { clearInterval(tWriter); setTimeout(()=>{if(callback)callback();}, 800); } }, 20);
        },
        
        // --- BATTLE MENUS ---
        hideMoves: function() { document.getElementById('main-actions').style.display='flex'; document.getElementById('moves-box').style.display='none'; },
        showMoves: function() { 
            if(gameState!=="BATTLE") return; let active = this.getActive(); let box = document.getElementById('moves-box'); box.innerHTML = "";
            active.moves.forEach(m => { let unlocked = active.level >= m.reqLvl; let btn = document.createElement('div'); btn.className = `action-btn ${!unlocked ? 'disabled' : ''}`; btn.innerHTML = `${m.name} <br><span style="font-size:12px">(${m.type})</span>`; if(unlocked) btn.onclick = () => this.executeMove(m); box.appendChild(btn); });
            let bck = document.createElement('div'); bck.className="action-btn"; bck.innerText="BACK"; bck.onclick = ()=>this.hideMoves(); box.appendChild(bck); document.getElementById('main-actions').style.display='none'; box.style.display='flex'; 
        },
        showBag: function() {
            if(gameState!=="BATTLE") return; let box = document.getElementById('moves-box'); box.innerHTML = "";
            let btnF = document.createElement('div'); btnF.className="action-btn"; btnF.innerHTML=`FOOD (x${PlayerState.food})`; btnF.onclick=()=>this.useBag(); box.appendChild(btnF);
            let btnC = document.createElement('div'); btnC.className="action-btn"; btnC.innerHTML=`POKEBALL`; btnC.onclick=()=>this.tryCatch(); box.appendChild(btnC);
            let bck = document.createElement('div'); bck.className="action-btn"; bck.innerText="BACK"; bck.onclick = ()=>this.hideMoves(); box.appendChild(bck);
            document.getElementById('main-actions').style.display='none'; box.style.display='flex'; 
        },
        showTeam: function() {
            if(gameState!=="BATTLE") return; let box = document.getElementById('moves-box'); box.innerHTML = "";
            PlayerState.team.forEach((p, idx) => {
                let btn = document.createElement('div'); btn.className = `action-btn ${p.hp <= 0 ? 'disabled' : ''}`; btn.style.fontSize="14px";
                btn.innerHTML = `${p.name} (Lv.${p.level})<br>HP: ${p.hp}/${p.maxHp}`;
                if(p.hp > 0) btn.onclick = () => this.switchPokemon(idx); box.appendChild(btn);

        // --- BATTLE ACTIONS ---
        switchPokemon: function(idx) {
            if (idx === PlayerState.activeIdx) { this.typeText(`${this.getActive().name} is already out!`, () => { gameState="BATTLE"; }); return; }
            PlayerState.activeIdx = idx; this.hideMoves(); this.updateBars();
            this.typeText(`Go! ${this.getActive().name.toUpperCase()}!`, () => this.enemyTurn());
        },
        executeMove: function(moveObj) {
            if(gameState !== "BATTLE") return; this.hideMoves(); let active = this.getActive();
            // TYPE EFFECTIVENESS & LEVEL SCALING
            let mult = getTypeMult(active.type, currentEnemy.type);
            let dmg = Math.floor((active.attack + active.level) * moveObj.mult * mult);
            if(dmg < 1) dmg = 1;
            let effMsg = mult > 1 ? " It's super effective!" : (mult < 1 ? " It's not very effective..." : "");

            this.typeText(`${active.name.toUpperCase()} used ${moveObj.name.toUpperCase()}!${effMsg}`, () => {
                animatePhysicalAttack(bPlayerMesh, bEnemyMesh, moveObj.type, () => {
                    currentEnemy.hp -= dmg; showFloatingDamage(bEnemyMesh, dmg, moveObj.type); this.updateBars();
                    if (currentEnemy.hp <= 0) setTimeout(()=>this.endFight(true), 800); else setTimeout(() => this.enemyTurn(), 800);
                });
            });
        },
        enemyTurn: function() {
            let active = this.getActive(); 
            // FIX: Dynamic Enemy Damage Scaling & Types
            let mult = getTypeMult(currentEnemy.type, active.type);
            let dmg = Math.floor((currentEnemy.attack + currentEnemy.level) * 1.2 * mult);
            if(dmg < 1) dmg = 1;
            let effMsg = mult > 1 ? " It's super effective!" : (mult < 1 ? " It's not very effective..." : "");

            this.typeText(`${currentEnemy.name.toUpperCase()} used TACKLE!${effMsg}`, () => {
                animatePhysicalAttack(bEnemyMesh, bPlayerMesh, 'normal', () => {
                    active.hp -= dmg; showFloatingDamage(bPlayerMesh, dmg, 'normal'); this.updateBars();
                    if (active.hp <= 0) {
                        this.typeText(`${active.name.toUpperCase()} fainted!`, () => this.checkNextPokemon());
                    } else { this.typeText(`What will you do?`, () => { gameState = "BATTLE"; }); }
                });
            });
        },
        checkNextPokemon: function() {
            let nextIdx = PlayerState.team.findIndex(p => p.hp > 0);
            if (nextIdx !== -1) {
                PlayerState.activeIdx = nextIdx; this.updateBars();
                this.typeText(`Go! ${this.getActive().name.toUpperCase()}!`, () => { gameState = "BATTLE"; });
            } else { this.endFight(false); } // all fainted
        },
        tryCatch: function() {
            if(gameState !== "BATTLE") return; this.hideMoves();
            if(currentEnemy.isBoss) { this.typeText("You cannot catch a Boss!", () => { gameState="BATTLE"; }); return; }
            let catchChance = 1.0 - (currentEnemy.hp / currentEnemy.maxHp); 
            this.typeText(`Threw a POKEBALL!`, () => {
                if(Math.random() < catchChance) {
                    this.typeText(`Gotcha! ${currentEnemy.name} was caught!`, () => {
                        let newPkmn = JSON.parse(JSON.stringify(currentEnemy)); newPkmn.hp = newPkmn.maxHp;
                        PlayerState.team.push(newPkmn); this.endFight(true, true);
                    });
                } else { this.typeText(`Oh no! It broke free!`, () => this.enemyTurn()); }
            });
        },
        useBag: function() {
            if(gameState !== "BATTLE") return; this.hideMoves(); let active = this.getActive();
            if(PlayerState.food > 0 && active.hp < active.maxHp) {
                PlayerState.food--; active.hp = Math.min(active.maxHp, active.hp + 30); this.updateBars(); GameLogic.updateHUD();
                this.typeText(`Used POKEMON FOOD. Healed 30 HP!`, () => this.enemyTurn());
            } else { this.typeText(`No food or HP is full!`, () => { gameState="BATTLE"; }); }
        },
        runAway: function() { if(gameState!=="BATTLE") return; if(currentEnemy.isBoss){this.typeText("Can't run!", ()=>{gameState="BATTLE";});}else{this.typeText("Got away safely!", ()=>this.exitBattleArena());} },
        
        endFight: function(won, caught=false) {
            if(currentEnemy.isBoss && won) { alert("CHAMPION! You beat Mewtwo!"); window.location.href="https://www.google.com"; return; }
            let expGained = won ? currentEnemy.level * 15 : currentEnemy.level * 4;
            let msg = won ? `${currentEnemy.name.toUpperCase()} fainted!` : `You lost...`;
            if(caught) msg = "Battle ended.";

            this.typeText(msg, () => {
                this.typeText(`Team gained ${expGained} EXP!`, () => {
                    let levelUps = [];
                    PlayerState.team.forEach(p => { p.exp += expGained; while(p.exp >= p.level * 20) { p.exp -= p.level*20; p.level++; p.maxHp+=5; p.hp=p.maxHp; p.attack+=2; levelUps.push(p.name); } });
                    if(won) PlayerState.gold += 10;
                    if(levelUps.length > 0) this.typeText(`${levelUps.join(', ')} Leveled Up!`, () => { this.handleDefeatOrWin(won); }); else this.handleDefeatOrWin(won);
                });
            });
        },
        handleDefeatOrWin: function(won) {
            if(!won) { PlayerState.team.forEach(p=>p.hp=p.maxHp); this.exitBattleArena(); GameLogic.teleportTo("HOSPITAL", 0, 5); alert("Your team fainted. Rushed to hospital."); } 
            else { this.exitBattleArena(); }
        },
        exitBattleArena: function() { document.getElementById('battle-ui').style.display='none'; document.getElementById('movement-controls').style.display='block'; document.getElementById('action-buttons').style.display='block'; GameLogic.updateHUD(); battleGroup.visible = false; GameLogic.teleportTo(currentRoom, playerMesh.position.x, playerMesh.position.z); gameState = "FREE_ROAM"; }
    };

    // ==========================================
    // 6. GAME LOOP
    // ==========================================
    const clock = new THREE.Clock(); 
    const animationClock = new THREE.Clock(); // Required to update the character bones
    const moveSpeed = 0.12; 
    GameLogic.updateHUD();
    // DEV MODE: Force spawn inside the stadium
    GameLogic.teleportTo("STADIUM", 0, 6);

    function checkCollision(nx, nz) {
        if(currentRoom === "WORLD") { 
            let l = 49.5; 
            if(nx<-l||nx>l||nz<-l||nz>l) return true; 
            if(Math.abs(nx-hospExt.position.x)<5&&Math.abs(nz-hospExt.position.z)<3) return true; 
            if (Math.abs(nx - stadExt.position.x) < 15.0 && Math.abs(nz - stadExt.position.z) < 10.0) {
                return true; 
            } 
            
            // --- UPDATED: EXACT BOUNDING BOX COLLISION ---
            // Calculate where the edges of the player are (player radius is ~0.4)
            let pxMin = nx - 0.4;
            let pxMax = nx + 0.4;
            let pzMin = nz - 0.4;
            let pzMax = nz + 0.4;

            for (let i = 0; i < fenceZonesList.length; i++) {
                let bbox = fenceZonesList[i];
                
                // Check if the player's square overlaps with the fence's exact bounding box
                if (pxMax > bbox.min.x && pxMin < bbox.max.x &&
                    pzMax > bbox.min.z && pzMin < bbox.max.z) {
                    return true; // Block movement!
                }
            }
            // ----------------------------------------------
            
        } 
        else if(currentRoom === "HOSPITAL") { 
            // 1. Check outer walls (adjust -7 / 7 if your new interior is bigger/smaller)
            if(nx < -7 || nx > 7 || nz < -2.5 || nz > 6) return true; 
            
            // 2. Dynamic desk collision based on hDesk's position!
            // If the player is within 3 units wide (X) and 1 unit deep (Z) of the desk center:
            if(Math.abs(nx - hDesk.position.x) < 3.0 && Math.abs(nz - hDesk.position.z) < 1.0) {
                return true; 
            }
        }
        else if(currentRoom === "STADIUM") { 
            // 1. Check outer walls
            if(nx < -9 || nx > 9 || nz < -9 || nz > 10) return true; 
            
            // --- NEW: Boss Collision Box ---
            // If the player is within 1.5 units (Left/Right) and 1.5 units (Front/Back) of the boss:
            if(Math.abs(nx - bossNPC.position.x) < 2 && Math.abs(nz - bossNPC.position.z) < 2.5) {
                return true; // Block movement!
            }
        }
        return false;
    }

    function animate() {
        requestAnimationFrame(animate); 
        const elapsedTime = clock.getElapsedTime();
        const delta = animationClock.getDelta();
        
        // --- Update the 3D GLB Animations ---
        if (playerMixer) {
            playerMixer.update(delta);
        }

        bossNPC.position.y = 1 + Math.sin(elapsedTime * 2) * 0.2;
        // --- NURSE JOY INTERACTION & ANIMATION LOGIC ---
        if (nurseMixer) nurseMixer.update(delta);

        if (typeof nurseJoy !== 'undefined') {
            let targetRotation = 0;
            let isPlayerNear = (currentRoom === "HOSPITAL" && playerMesh.position.distanceTo(hDesk.position) < 3.5);

            if (isPlayerNear) {
                targetRotation = 0; // Face the player directly

                // If the player JUST walked up to the desk...
                if (!isNurseGreeting) {
                    isNurseGreeting = true; // Mark that she is greeting
                    if (nurseGreetAction) {
                        nurseGreetAction.reset(); // Rewind to start
                        nurseGreetAction.setEffectiveTimeScale(1);
                        nurseGreetAction.setEffectiveWeight(1);
                        nurseGreetAction.fadeIn(0.2); // Smoothly blend into the greeting
                        nurseGreetAction.play();
                    }
                }
            } else {
                targetRotation = Math.sin(elapsedTime * 1.5) * 0.3; // Resume swaying math

                // If the player JUST walked away...
                if (isNurseGreeting) {
                    isNurseGreeting = false; // Mark that player left
                    if (nurseGreetAction) {
                        // Smoothly fade out the animation over 0.5s so she returns to her normal resting pose
                        nurseGreetAction.fadeOut(0.5); 
                    }
                }
            }

            // Smoothly ease her rotation toward the target (so she doesn't snap)
            nurseJoy.rotation.y += (targetRotation - nurseJoy.rotation.y) * 0.1;
        }
        // ------------------------------------------------
        // --- BOSS NPC ANIMATION STATE MACHINE ---
        if (bossMixer) bossMixer.update(delta);

        const isInStadium = (currentRoom === "STADIUM");
        const isNearBoss = (playerMesh.position.distanceTo(bossNPC.position) < 3.5);

        // 1. Player JUST entered Stadium -> Wake up!
        if (isInStadium && !wasInStadium) {
            bossState = 'WAKING';
            fadeBossAnimation('Wake', 0.5);
        }
        
        // 2. Player gets NEAR boss -> Greet!
        if (isInStadium && isNearBoss && !wasNearBoss && bossState !== 'GREET') {
            bossState = 'GREET';
            fadeBossAnimation('Greet', 0.3);
        }

        // 3. Player moves AWAY from boss -> Bye! (Listener handles returning to Sleep)
        if (isInStadium && !isNearBoss && wasNearBoss && bossState === 'GREET') {
            bossState = 'BYE';
            fadeBossAnimation('Bye', 0.3);
        }

        // 4. Player completely left the Stadium (Failsafe reset)
        if (!isInStadium && wasInStadium) {
            bossState = 'SLEEP';
            fadeBossAnimation('Sleep', 0.3);
        }

        // Update trackers for the next frame
        wasInStadium = isInStadium;
        wasNearBoss = isNearBoss;
        // ----------------------------------------

        if (gameState === "FREE_ROAM") {
            let moved = false; let dx = 0, dz = 0;
            if (keys.w) { dz -= moveSpeed; moved = true; } if (keys.s) { dz += moveSpeed; moved = true; }
            if (keys.a) { dx -= moveSpeed; moved = true; } if (keys.d) { dx += moveSpeed; moved = true; }

            if (moved) {
                if(!checkCollision(playerMesh.position.x+dx, playerMesh.position.z)) playerMesh.position.x += dx;
                if(!checkCollision(playerMesh.position.x, playerMesh.position.z+dz)) playerMesh.position.z += dz;
                
                playerMesh.rotation.y = Math.atan2(dx, dz); // Keep rotating character direction
                fadeToAnimation('Walk'); // Ensure exact animation name matches!
            } else { 
                fadeToAnimation('Idle'); // Ensure exact animation name matches!
            }

            // Ensure Y position stays flat (removing old procedural bounce math)
            playerMesh.position.y = 0.5; 
            playerMesh.rotation.z = 0;

            // --- TALL GRASS ENCOUNTER LOGIC ---
            let inGrass = false;
            if (currentRoom === "WORLD") {
                // Check if player is standing on any specific grass tile (within 1 unit)
                for (let i = 0; i < grassZonesList.length; i++) {
                    let gx = grassZonesList[i].x;
                    let gz = grassZonesList[i].z;
                    if (Math.abs(playerMesh.position.x - gx) < 1.0 && Math.abs(playerMesh.position.z - gz) < 1.0) {
                        inGrass = true;
                        break;
                    }
                }
            }

            // High chance to trigger since they are actively stepping on a grass tile
            if (moved && inGrass && Math.random() < 0.02) {
                BattleSystem.startWildEncounter();
            }
            // ----------------------------------

            let promptText = "";
            if (currentRoom === "WORLD") { if (playerMesh.position.distanceTo(hospDoor.position) < 1.5) GameLogic.teleportTo("HOSPITAL", 0, 5); else if (playerMesh.position.distanceTo(stadDoor.position) < 2.0) GameLogic.teleportTo("STADIUM", 0, 7); } 
            else if (currentRoom === "HOSPITAL") { if (playerMesh.position.distanceTo(hExit.position) < 2) promptText = "▼ Press 'A' to Exit"; else if (playerMesh.position.distanceTo(hDesk.position) < 3.5) promptText = "▼ Press 'A' to Talk"; } 
            else if (currentRoom === "STADIUM") { if (playerMesh.position.distanceTo(sExit.position) < 2) promptText = "▼ Press 'A' to Exit"; else if (playerMesh.position.distanceTo(bossNPC.position) < 3) promptText = "▼ Press 'A' to Talk"; }
            
            const promptEl = document.getElementById('action-prompt'); if (promptText !== "") { promptEl.innerText = promptText; promptEl.style.display = 'block'; } else { promptEl.style.display = 'none'; }
            camera.position.x += (playerMesh.position.x - camera.position.x) * 0.1; camera.position.z += (playerMesh.position.z + 8 - camera.position.z) * 0.1; camera.lookAt(playerMesh.position);
        }
        renderer.render(scene, camera);
    }
    animate();
    window.addEventListener('resize', () => { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
</script>
</body>
